<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<title>
			Z-Wave JS - Z-Wave driver written entirely in JavaScript/TypeScript
		</title>
		<meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
		<meta
			name="description"
			content="Z-Wave driver written entirely in JavaScript/TypeScript"
		/>
		<meta
			name="viewport"
			content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
		/>
		<link rel="stylesheet" href="//unpkg.com/docsify/lib/themes/vue.css" />
		<style>
			.markdown-section h1 code,
			.markdown-section h2 code,
			.markdown-section h3 code,
			.markdown-section h4 code,
			.markdown-section h5 code,
			.markdown-section h6 code {
				/* Reset the font size to the headline size */
				font-size: inherit;
			}

			/*
				Custom styling for type previews on hover and type-links in listings
			*/
			.markdown-section pre {
				/* Match the tab width used in the source files */
				tab-size: 4;
				-moz-tab-size: 4;
			}
			.markdown-section pre a.type-link {
				color: inherit;
				text-decoration: underline dotted;
				text-underline-offset: 3px;
			}
			.markdown-section pre a.type-link:hover {
				text-decoration: underline;
			}
			.type-link-tooltip {
				position: absolute;
				z-index: 100;
				max-width: min(600px, calc(100vw - 20px));
				max-height: 320px;
				overflow: auto;
				background: #f8f8f8;
				border: 1px solid #ddd;
				border-radius: 4px;
				box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
			}
			.type-link-tooltip pre {
				margin: 0;
				padding: 8px 12px;
				font-family: "Roboto Mono", Monaco, courier, monospace;
				font-size: 0.85em;
				line-height: 1.4;
				white-space: pre;
				tab-size: 4;
			}
			.type-link-tooltip-desc {
				margin: 0;
				padding: 8px 12px;
				font-size: 0.85em;
				line-height: 1.4;
				color: #333;
			}
			.type-link-tooltip-desc + pre {
				border-top: 1px solid #eee;
			}
		</style>
	</head>
	<body>
		<div id="app"></div>
		<script src="//unpkg.com/docsify/lib/docsify.min.js"></script>
		<script src="//unpkg.com/docsify-edit-on-github/index.js"></script>
		<!-- Load syntax highlighters -->
		<script src="//unpkg.com/prismjs/components/prism-bash.min.js"></script>
		<script src="//unpkg.com/prismjs/components/prism-typescript.min.js"></script>
		<script src="//unpkg.com/prismjs/components/prism-json.min.js"></script>
		<script src="//unpkg.com/prismjs/components/prism-diff.min.js"></script>
		<script src="//unpkg.com/prismjs/components/prism-log.min.js"></script>

		<script>
			window.$docsify = {
				name: "Z-Wave JS",
				repo: "https://github.com/zwave-js/zwave-js",
				loadSidebar: true,
				subMaxLevel: 3,
				auto2top: true,
				// coverpage: true,
				// onlyCover: true,

				// Avoid collisions with other docs on the same domain
				search: {
					namespace: "zwave-js",
				},

				plugins: [
					EditOnGithubPlugin.create(
						"https://github.com/zwave-js/zwave-js/blob/master/docs/",
						null,
						null,
					),
				],

				"flexible-alerts": {
					style: "flat",
				},
			};
		</script>
		<script src="//unpkg.com/docsify/lib/plugins/search.min.js"></script>
		<script src="//unpkg.com/docsify-plugin-flexible-alerts"></script>
		<script src="plugins/type-links.js"></script>
	</body>
</html>
